<!DOCTYPE html>
<html
  lang="{{ site.Language.LanguageCode }}"
  dir="{{ or site.Language.LanguageDirection `ltr` }}"
>
  <head>
    {{ partial "head.html" . }}
    <script>
      (function () {
        var storageKey = 'theme-preference';
        var root = document.documentElement;
        var mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        var metaThemeColor;

        function getStoredTheme() {
          try {
            return localStorage.getItem(storageKey);
          } catch (error) {
            return null;
          }
        }

        function getSystemTheme() {
          return mediaQuery.matches ? 'dark' : 'light';
        }

        function getActiveTheme() {
          var theme = root.getAttribute('data-theme');

          if (theme === 'dark' || theme === 'light') {
            return theme;
          }

          theme = getStoredTheme();

          if (theme === 'dark' || theme === 'light') {
            return theme;
          }

          return getSystemTheme();
        }

        function syncToggle(theme) {
          var toggle = document.querySelector('[data-theme-toggle]');

          if (!toggle) {
            return;
          }

          toggle.setAttribute(
            'aria-label',
            'Switch to ' + (theme === 'dark' ? 'light' : 'dark') + ' theme'
          );
          toggle.setAttribute('aria-pressed', String(theme === 'dark'));
        }

        function syncThemeColor(theme) {
          if (!metaThemeColor) {
            metaThemeColor = document.querySelector('meta[name="theme-color"]');
          }

          if (metaThemeColor) {
            metaThemeColor.setAttribute(
              'content',
              theme === 'dark' ? '#1f1b18' : '#f6f4ec'
            );
          }
        }

        function applyTheme(theme) {
          root.setAttribute('data-theme', theme);

          try {
            localStorage.setItem(storageKey, theme);
          } catch (error) {}

          syncToggle(theme);
          syncThemeColor(theme);
        }

        function handleSystemThemeChange() {
          var storedTheme = getStoredTheme();

          if (storedTheme === 'dark' || storedTheme === 'light') {
            return;
          }

          syncToggle(getSystemTheme());
          syncThemeColor(getSystemTheme());
        }

        var storedTheme = getStoredTheme();

        if (storedTheme === 'dark' || storedTheme === 'light') {
          root.setAttribute('data-theme', storedTheme);
        }

        syncThemeColor(getActiveTheme());

        document.addEventListener('DOMContentLoaded', function () {
          var toggle = document.querySelector('[data-theme-toggle]');
          var theme = getActiveTheme();

          syncToggle(theme);
          syncThemeColor(theme);

          if (!toggle) {
            return;
          }

          toggle.addEventListener('click', function () {
            applyTheme(getActiveTheme() === 'dark' ? 'light' : 'dark');
          });
        });

        if (typeof mediaQuery.addEventListener === 'function') {
          mediaQuery.addEventListener('change', handleSystemThemeChange);
        } else if (typeof mediaQuery.addListener === 'function') {
          mediaQuery.addListener(handleSystemThemeChange);
        }
      })();
    </script>
  </head>
  <body
    class="
      kind-{{ .Kind }}
      {{ if .IsHome }}is-home{{ end }}
      {{ if .IsPage }}is-page{{ end }}
      {{ with .Section }}section-{{ . | urlize }}{{ end }}
    "
  >
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header role="banner">{{ partial "header.html" . }}</header>
    <main id="main-content" role="main">{{ block "main" . }}{{ end }}</main>
    <footer role="contentinfo">{{ partial "footer.html" . }}</footer>
  </body>
</html>
